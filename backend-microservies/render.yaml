services:
  - name: ecommerce-gateway
    type: web
    runtime: docker
    rootDir: .
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: node gateway/server.js
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: AUTH_SERVICE_URL
        sync: false
      - key: CATALOG_SERVICE_URL
        sync: false
      - key: ORDERS_SERVICE_URL
        sync: false
      - key: PAYMENTS_SERVICE_URL
        sync: false
      - key: NOTIFICATIONS_SERVICE_URL
        sync: false
      - key: ADMIN_SERVICE_URL
        sync: false

  - name: ecommerce-auth
    type: web
    runtime: docker
    rootDir: .
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: node services/auth/server.js
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false

