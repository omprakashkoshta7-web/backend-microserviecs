        sync: false

  - name: ecommerce-payments
    type: web
    runtime: docker
    rootDir: .
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: node services/payments/server.js
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false

  - name: ecommerce-notifications
    type: web
    runtime: docker
